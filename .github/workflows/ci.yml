name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test:unit
      # mcp-bridge is a pure stdio<->ws relay with no shared-contract deps, so
      # there is no sync gate here. Supply-chain scanning is handled separately,
      # outside this repo.
